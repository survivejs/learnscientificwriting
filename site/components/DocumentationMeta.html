<div class="flex flex-col gap-4">
  <div class="flex flex-row gap-4 justify-between text-sm">
    <div class="flex flex-col gap-2">
      <div
        &visibleIf="(get props document.data.author.name)"
        class="flex flex-col sm:flex-row gap-1"
      >
        <span>Author:</span>
        <SiteLink
          class="font-extralight"
          &children="(get props document.data.author.name)"
          &href="(get props document.data.author.site)"
        ></SiteLink>
      </div>
      <div
        &visibleIf="(get props document.data.editors)"
        class="flex flex-col sm:flex-row gap-1"
      >
        <span>Editors:</span>
        <ul
          class="inline-flex flex flex-row gap-2"
          &foreach="(get props document.data.editors)"
        >
          <li>
            <SiteLink
              class="font-extralight"
              &children="(get props name)"
              &href="(get props twitter)"
            />
          </li>
        </ul>
      </div>
    </div>
    <div &visibleIf="(get props document.data.topics)" class="-mt-1">
      <Heading level="2" class="sr-only">Topics</Heading>
      <ul
        class="flex flex-col sm:flex-row gap-2 sm:gap-4 text-sm whitespace-nowrap"
        &foreach="(get props document.data.topics)"
      >
        <li>
          <Badge>
            <SiteLink
              class="p-1 font-extralight"
              &children="(get props title)"
              &href="(urlJoin / blog topics (get props slug) /)"
            />
          </Badge>
        </li>
      </ul>
    </div>
    <div class="flex flex-col gap-2">
      <div
        &visibleIf="(get props document.data.date)"
        class="flex flex-col sm:flex-row gap-1"
      >
        <span>Published:</span>
        <FormattedTime
          class="font-extralight"
          &date="(get props document.data.date)"
        />
      </div>
      <div
        &visibleIf="(get props document.data.updateDate)"
        class="flex flex-col sm:flex-row gap-1"
      >
        <span>Updated:</span>
        <FormattedTime
          class="font-extralight"
          &date="(get props document.data.updateDate)"
        />
      </div>
    </div>
  </div>
  <nav
    class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm print:hidden"
    &visibleIf="(or (get props previous) (get props next))"
  >
    <a
      &visibleIf="(get props previous)"
      class="group flex min-h-24 flex-col justify-between rounded border border-slate-200 bg-white/70 p-4 no-underline shadow-sm transition hover:border-muted hover:bg-white dark:border-[#d9cdb8]/15 dark:bg-[#201c16]/80 dark:hover:border-[#8fb9b9] dark:hover:bg-[#252017]"
      &href="(get props previous.data.slug)"
    >
      <span class="text-xs font-semibold uppercase tracking-wide text-muted dark:text-[#8fb9b9]">
        ← Previous
      </span>
      <span class="mt-3 font-medium text-slate-950 group-hover:underline dark:text-[#f7ead0]">
        <noop &children="(get props previous.data.title)" />
      </span>
    </a>
    <a
      &visibleIf="(get props next)"
      class="group flex min-h-24 flex-col justify-between rounded border border-slate-200 bg-white/70 p-4 text-right no-underline shadow-sm transition hover:border-muted hover:bg-white sm:col-start-2 dark:border-[#d9cdb8]/15 dark:bg-[#201c16]/80 dark:hover:border-[#8fb9b9] dark:hover:bg-[#252017]"
      &href="(get props next.data.slug)"
    >
      <span class="text-xs font-semibold uppercase tracking-wide text-muted dark:text-[#8fb9b9]">
        Next →
      </span>
      <span class="mt-3 font-medium text-slate-950 group-hover:underline dark:text-[#f7ead0]">
        <noop &children="(get props next.data.title)" />
      </span>
    </a>
  </nav>
</div>
