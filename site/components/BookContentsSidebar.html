<nav
  class="hidden flex-col xl:flex border-t border-slate-200 pt-4 text-sm dark:border-[#d9cdb8]/15"
  &visibleIf="(get props contents)"
>
  <div class="mb-3 text-xs font-semibold uppercase tracking-wide text-muted dark:text-[#8fb9b9]">
    Book contents
  </div>
  <ol class="flex flex-col gap-0.5" &foreach="(get props contents.chapters)">
    <li>
      <a
        x-attr
        &href="(get props href)"
        @aria-current="element.pathname === location.pathname ? 'page' : undefined"
        &class="(concat
          'group flex gap-2 border-l-2 border-transparent py-1 pl-3 leading-snug text-muted hover:border-slate-400 hover:text-slate-950 dark:text-[#8fb9b9] dark:hover:border-[#d9cdb8]/50 dark:hover:text-[#f7ead0]'
          ' '
          (pick (equals (trim (get props href) /) (trim (get context url) /)) 'border-warning text-slate-950 font-medium dark:border-warning dark:text-[#f7ead0]')
        )"
      >
        <span class="w-5 shrink-0 font-mono text-xs tabular-nums opacity-70" &children="(get props number)" />
        <span &children="(get props title)" />
      </a>
    </li>
  </ol>
  <div class="mt-4 mb-2 text-xs font-semibold uppercase tracking-wide text-muted/80 dark:text-[#8fb9b9]/80">
    Appendices
  </div>
  <ol class="flex flex-col gap-0.5" &foreach="(get props contents.appendices)">
    <li>
      <a
        x-attr
        &href="(get props href)"
        @aria-current="element.pathname === location.pathname ? 'page' : undefined"
        &class="(concat
          'group flex gap-2 border-l-2 border-transparent py-1 pl-3 leading-snug text-muted hover:border-slate-400 hover:text-slate-950 dark:text-[#8fb9b9] dark:hover:border-[#d9cdb8]/50 dark:hover:text-[#f7ead0]'
          ' '
          (pick (equals (trim (get props href) /) (trim (get context url) /)) 'border-warning text-slate-950 font-medium dark:border-warning dark:text-[#f7ead0]')
        )"
      >
        <span class="w-5 shrink-0 font-mono text-xs tabular-nums opacity-70" &children="(get props number)" />
        <span &children="(get props title)" />
      </a>
    </li>
  </ol>
  <a
    x-attr
    class="mt-3 block border-l-2 border-transparent py-1 pl-3 leading-snug text-muted hover:border-slate-400 hover:text-slate-950 dark:text-[#8fb9b9] dark:hover:border-[#d9cdb8]/50 dark:hover:text-[#f7ead0]"
    href="/book/references/"
    @aria-current="element.pathname === location.pathname ? 'page' : undefined"
    >References</a
  >
</nav>
