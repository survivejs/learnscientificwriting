<nav
  x-label="parent"
  x-state="{ closest: {} }"
  x-closest="{ state: { closest: document.querySelectorAll('main h2, main h3') } }"
  class="text-sm"
>
  <div class="mb-3 text-xs font-semibold uppercase tracking-wide text-muted">
    On this page
  </div>
  <ul &foreach="(get props toc)" class="flex flex-col gap-1.5">
    <li>
      <a
        x-attr
        class="block border-l-2 border-transparent py-1 pl-3 leading-snug text-muted hover:border-slate-400 hover:text-slate-950"
        &@class="(concat
          '[element.firstChild?.textContent.trim() === parent.closest?.firstChild?.textContent.trim() && `'
          (tw 'border-muted text-slate-950 font-medium')
          '`]')"
        &href="(concat # (get props slug))"
        &children="(get props raw)"
      ></a>
    </li>
  </ul>
</nav>
