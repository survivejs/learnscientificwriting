<div
  class="w-full h-1.5 bg-secondary"
  x-state="{ scrollY: 0, scrollHeight: 0 }"
  x-scroll="{
    state: {
      scrollRatio: window.scrollY / (document.body.scrollHeight - window.innerHeight)
    }
  }"
>
  <span
    class="absolute top-0 z-50 inline-block h-1.5 bg-warning shadow-[0_0_10px_rgba(180,107,48,0.6)]"
    x-attr
    @style="'width:' + state.scrollRatio * 100 + '%;'"
    >&nbsp;</span
  >
</div>
