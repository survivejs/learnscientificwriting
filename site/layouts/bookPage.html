<BaseLayout>
  <slot name="content">
    <div
      class="md:mx-auto p-4 md:p-0 w-full md:max-w-3xl flex flex-col gap-10"
    >
      <article class="flex flex-col gap-8">
        <Heading
          level="1"
          class="font-extrabold text-4xl md:text-5xl leading-tight tracking-normal"
          &children="(get context document.data.title)"
        ></Heading>
        <DocumentationMeta &document="(get context document)" />
        <div
          class="prose lg:prose-xl prose-slate prose-p:leading-8 prose-li:leading-8 prose-headings:tracking-normal prose-headings:text-slate-950 prose-a:text-muted hover:prose-a:text-slate-950 prose-blockquote:border-muted prose-code:text-slate-800"
          &children="(get context document.content)"
        ></div>
      </article>
      <section class="flex flex-col gap-8 print:hidden">
        <DocumentationMeta
          &document="(get context document)"
          &previous="(get context document.previous)"
          &next="(get context document.next)"
        />
      </section>
    </div>
  </slot>
  <slot name="aside">
    <div
      class="flex flex-col gap-8"
      &visibleIf="(get context document.hasTableOfContents)"
    >
      <TableOfContents &toc="(get context document.tableOfContents)" />
    </div>
  </slot>
</BaseLayout>
