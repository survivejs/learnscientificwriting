<!DOCTYPE html>
<html &lang="(get context meta.language)">
  <head>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎩</text></svg>"
    />
    <link
      __reference="https://web.dev/defer-non-critical-css/"
      rel="preload"
      href="https://cdn.jsdelivr.net/gh/highlightjs/highlight.js@11.10.0/src/styles/github-dark.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/highlightjs/highlight.js@11.10.0/src/styles/github-dark.min.css"
    /></noscript>
    <MetaFields />
  </head>
  <body class="bg-[#fbfaf7] text-slate-900 antialiased">
    <a href="#content" class="sr-only focus:not-sr-only p-4">
      Skip to content
    </a>
    <div class="z-50 sticky top-0 h-12 print:hidden">
      <ReadingProgress />
      <MainNavigation
        &aside="(get props aside)"
        &showAside="(get context document.hasTableOfContents)"
      />
    </div>
    <aside
      &visibleIf="(and (get props aside) (get context document.hasTableOfContents))"
      class="fixed ml-4 mt-16 hidden xl:inline w-60 bg-white/80 backdrop-blur p-4 rounded border border-slate-200 shadow-sm"
      &children="(get props aside)"
    ></aside>
    <main id="content" class="scroll-mt-24">
      <input class="hidden peer/search" id="search__toggle" type="checkbox" />
      <div
        class="hidden peer-checked/search:block fixed left-0 right-0 top-12 z-40 border-b border-muted/30 bg-white/95 shadow-lg print:hidden"
      >
        <div class="md:mx-auto p-4 md:px-0 w-full md:max-w-3xl">
          <div class="mb-3 flex justify-end">
            <label
              for="search__toggle"
              class="cursor-pointer text-sm text-muted underline hover:text-primary"
              >Close search</label
            >
          </div>
          <PageFind />
        </div>
      </div>
      <noop &children="(get props content)" />
    </main>
    <MainFooter />
    <Scripts />
  </body>
</html>
